<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mezuniyet Kayıt Formu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border-top: 8px solid #d32f2f; }
        h1 { color: #d32f2f; text-align: center; margin-bottom: 5px; font-size: 24px; }
        h2 { color: #555; text-align: center; margin-bottom: 25px; font-size: 18px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #333; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .radio-group { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #bbb; margin-bottom: 15px; }
        .radio-option { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .radio-option input { margin-right: 10px; width: 18px; height: 18px; }
        button { width: 100%; background-color: #d32f2f; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 20px; }
        button:hover { background-color: #b71c1c; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>KERNEK ANADOLU LİSESİ</h1>
    <h2>Mezuniyet Kayıt Formu</h2>

    <form action="https://formspree.io/f/mwvrqbjy" method="POST">
        
        <label for="Ad_Soyad">Adınız ve Soyadınız:</label>
        <input type="text" name="Ad_Soyad" placeholder="Örn: Ahmet Yılmaz" required>

        <label>Mezuniyet Hangi Gün Olsun?</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="Tercih_Edilen_Gun" value="13 Haziran Cuma" required> 13 Haziran Cuma
            </label>
            <label class="radio-option">
                <input type="radio" name="Tercih_Edilen_Gun" value="14 Haziran Cumartesi"> 14 Haziran Cumartesi
            </label>
            <label class="radio-option">
                <input type="radio" name="Tercih_Edilen_Gun" value="15 Haziran Pazar"> 15 Haziran Pazar
            </label>
        </div>

        <label for="Mekan_Onerisi">Mezuniyet nerede olsun istersiniz?</label>
        <input type="text" name="Mekan_Onerisi" placeholder="Örn: Altın Kayısı Otel, Okul Bahçesi vb." required>

        <label for="Not">Eklemek İstediğiniz Bir Not Var mı?</label>
        <input type="text" name="Mesaj" placeholder="Varsa buraya yazabilirsiniz...">

        <button type="submit">Başvuruyu Tamamla</button>
    </form>

    <div class="footer">
        © 2024 Kernek Anadolu Lisesi Mezuniyet Komitesi
    </div>
</div>

</body>
</html>
